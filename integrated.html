<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПВЗ Тярлево — потенциал + финмодель</title>
<style>
:root{color-scheme:light;--bg:#f6f7f9;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--ozon:#005bff;--chip:#eef2ff;}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
.bar{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:10px 12px;}
.bar h1{font-size:16px;margin:0 0 8px;}
.tabs{display:flex;gap:6px;}
.tabs button{flex:1;max-width:280px;font-size:13px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:9px;padding:9px;cursor:pointer;}
.tabs button.on{background:var(--ozon);border-color:var(--ozon);color:#fff;}
.flow{font-size:11.5px;color:var(--muted);margin-top:7px;}
.flow b{color:var(--ozon);}
iframe{width:100%;border:0;display:block;background:var(--bg);}
.hidden{display:none;}
</style>
</head>
<body>
  <div class="bar">
    <h1>ПВЗ Ozon · Тярлево — потенциал места + финансовая модель</h1>
    <div class="tabs">
      <button id="tabMap" class="on" onclick="show('map')">🗺️ Карта и потенциал</button>
      <button id="tabFin" onclick="show('fin')">📊 Финмодель</button>
    </div>
    <div class="flow">На карте оцените спрос → нажмите <b>«Подставить оборот в финмодель»</b> → во вкладке «Финмодель» увидите прибыль, окупаемость и точку безубыточности для этого оборота.</div>
  </div>
  <div>
    <iframe id="fMap" src="./potential.html" title="Карта и потенциал"></iframe>
    <iframe id="fFin" class="hidden" src="./finance.html" title="Финмодель"></iframe>
  </div>

<script>
const fMap=document.getElementById('fMap'), fFin=document.getElementById('fFin');
function resize(){ const h=Math.max(window.innerHeight-110,520); fMap.style.height=h+'px'; fFin.style.height=h+'px'; }
window.addEventListener('resize',resize); resize();
function show(which){
  const map=which==='map';
  fMap.classList.toggle('hidden',!map);
  fFin.classList.toggle('hidden',map);
  document.getElementById('tabMap').classList.toggle('on',map);
  document.getElementById('tabFin').classList.toggle('on',!map);
}
// двусторонний мостик карта ↔ финмодель
let lastBE=0;
function sendBEtoMap(v){ try{ fMap.contentWindow.postMessage({type:'setBreakEven', value:v},'*'); }catch(err){} }
window.addEventListener('message',e=>{
  if(!e.data) return;
  if(e.data.type==='fromMapTurnover'){            // карта → финмодель: оборот
    fFin.src='./finance.html?turnover='+encodeURIComponent(e.data.value)+'&_='+Date.now();
    show('fin');
  } else if(e.data.type==='fromFinance'){          // финмодель → карта: безубыточность
    lastBE=e.data.beTurnover; sendBEtoMap(lastBE);
  } else if(e.data.type==='mapReady'){             // карта загрузилась — отдаём ей актуальную безубыточность
    if(lastBE>0) sendBEtoMap(lastBE);
  } else if(e.data.type==='showMap'){              // финмодель → показать карту
    show('map');
  }
});
</script>
</body>
</html>
